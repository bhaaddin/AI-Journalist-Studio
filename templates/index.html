<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>AI Journalist Studio</title>
<style>
:root {
  --bg-primary: #0f0f1a;
  --bg-secondary: #1a1a2e;
  --bg-tertiary: #252540;
  --text-primary: #e0e0e0;
  --text-secondary: #9090a0;
  --accent: #00d4aa;
  --accent-hover: #00e8bb;
  --accent-dim: rgba(0, 212, 170, 0.15);
  --border: #2a2a40;
  --error: #ff5555;
  --success: #00d4aa;
  --radius: 8px;
  --shadow: 0 4px 24px rgba(0, 0, 0, 0.4);
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
  background: var(--bg-primary);
  color: var(--text-primary);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}
a { color: var(--accent); text-decoration: none; }
a:hover { text-decoration: underline; }

/* Header */
header {
  background: var(--bg-secondary);
  border-bottom: 1px solid var(--border);
  padding: 1.5rem 2rem;
  text-align: center;
}
header h1 {
  font-size: 1.75rem;
  letter-spacing: 3px;
  color: var(--accent);
  font-weight: 700;
}
header p {
  font-size: 0.85rem;
  color: var(--text-secondary);
  margin-top: 0.25rem;
  letter-spacing: 1px;
}

/* Main layout */
.container {
  max-width: 960px;
  margin: 0 auto;
  padding: 1.5rem;
  flex: 1;
  width: 100%;
}

/* Cards */
.card {
  background: var(--bg-secondary);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 1.5rem;
  margin-bottom: 1.5rem;
  box-shadow: var(--shadow);
}
.card-title {
  font-size: 0.8rem;
  text-transform: uppercase;
  letter-spacing: 2px;
  color: var(--text-secondary);
  margin-bottom: 1rem;
}

/* Form */
.form-group { margin-bottom: 1rem; }
.form-group label {
  display: block;
  font-size: 0.8rem;
  color: var(--text-secondary);
  margin-bottom: 0.4rem;
  text-transform: uppercase;
  letter-spacing: 1px;
}
.form-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 1rem;
}
input[type="text"], select {
  width: 100%;
  padding: 0.7rem 1rem;
  background: var(--bg-tertiary);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  color: var(--text-primary);
  font-size: 0.95rem;
  font-family: inherit;
  transition: border-color 0.2s;
}
input[type="text"]:focus, select:focus {
  outline: none;
  border-color: var(--accent);
}
select { cursor: pointer; }
select option { background: var(--bg-tertiary); color: var(--text-primary); }

/* Buttons */
.btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 0.5rem;
  padding: 0.75rem 1.5rem;
  border: none;
  border-radius: var(--radius);
  font-size: 0.95rem;
  font-weight: 600;
  font-family: inherit;
  cursor: pointer;
  transition: all 0.2s;
}
.btn-primary {
  background: var(--accent);
  color: var(--bg-primary);
  width: 100%;
}
.btn-primary:hover:not(:disabled) { background: var(--accent-hover); }
.btn-primary:disabled {
  opacity: 0.5;
  cursor: not-allowed;
}
.btn-download {
  background: var(--bg-tertiary);
  color: var(--text-primary);
  border: 1px solid var(--border);
  padding: 0.5rem 1rem;
  font-size: 0.85rem;
}
.btn-download:hover:not(:disabled) {
  border-color: var(--accent);
  color: var(--accent);
}
.btn-download:disabled {
  opacity: 0.35;
  cursor: not-allowed;
}

/* Progress */
.progress-section { display: none; }
.progress-section.active { display: block; }
.progress-bar-track {
  width: 100%;
  height: 8px;
  background: var(--bg-tertiary);
  border-radius: 4px;
  overflow: hidden;
  margin: 0.5rem 0;
}
.progress-bar-fill {
  height: 100%;
  width: 0%;
  background: linear-gradient(90deg, var(--accent), var(--accent-hover));
  border-radius: 4px;
  transition: width 0.4s ease;
}
.progress-label {
  display: flex;
  justify-content: space-between;
  font-size: 0.85rem;
  color: var(--text-secondary);
  margin-top: 0.3rem;
}
.stage-text {
  font-size: 0.9rem;
  color: var(--accent);
  margin-bottom: 0.3rem;
}
.stage-error {
  color: var(--error);
  margin-top: 0.5rem;
  font-size: 0.85rem;
}

/* Results */
.results-section { display: none; }
.results-section.active { display: block; }
.article-preview {
  background: var(--bg-primary);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 1.5rem;
  max-height: 500px;
  overflow-y: auto;
  line-height: 1.7;
  font-size: 0.95rem;
}
.article-preview h1, .article-preview h2, .article-preview h3, .article-preview h4 {
  color: var(--accent);
  margin: 1.2em 0 0.5em;
}
.article-preview h1 { font-size: 1.5rem; }
.article-preview h2 { font-size: 1.25rem; }
.article-preview h3 { font-size: 1.1rem; }
.article-preview p { margin: 0.6em 0; }
.article-preview a { color: var(--accent); }
.article-preview blockquote {
  border-left: 3px solid var(--accent);
  margin: 1em 0;
  padding-left: 1em;
  color: var(--text-secondary);
}
.article-preview code {
  background: var(--bg-tertiary);
  padding: 2px 6px;
  border-radius: 3px;
  font-size: 0.9em;
}
.article-preview pre {
  background: var(--bg-tertiary);
  padding: 1em;
  border-radius: var(--radius);
  overflow-x: auto;
}
.article-preview img {
  max-width: 100%;
  border-radius: 6px;
  margin: 1em 0;
}
.article-preview table {
  border-collapse: collapse;
  width: 100%;
  margin: 1em 0;
}
.article-preview th, .article-preview td {
  border: 1px solid var(--border);
  padding: 8px;
  text-align: left;
}
.article-preview th { background: var(--bg-tertiary); color: var(--accent); }

/* Download buttons */
.download-bar {
  display: flex;
  gap: 0.5rem;
  flex-wrap: wrap;
  margin-top: 1rem;
}

/* Image gallery */
.image-gallery {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
  gap: 0.75rem;
  margin-top: 1rem;
}
.image-gallery .gallery-item {
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
  background: var(--bg-primary);
}
.image-gallery img {
  width: 100%;
  height: 120px;
  object-fit: cover;
  display: block;
}
.image-gallery .gallery-caption {
  padding: 0.4rem 0.6rem;
  font-size: 0.75rem;
  color: var(--text-secondary);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

/* Footer */
footer {
  text-align: center;
  padding: 1.5rem;
  color: var(--text-secondary);
  font-size: 0.8rem;
  letter-spacing: 1px;
  border-top: 1px solid var(--border);
  margin-top: auto;
}

/* Spinner */
.spinner {
  display: inline-block;
  width: 16px;
  height: 16px;
  border: 2px solid var(--bg-primary);
  border-top-color: transparent;
  border-radius: 50%;
  animation: spin 0.6s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* Responsive */
@media (max-width: 600px) {
  header { padding: 1rem; }
  header h1 { font-size: 1.3rem; }
  .container { padding: 1rem; }
  .card { padding: 1rem; }
  .form-row { grid-template-columns: 1fr; }
  .article-preview { max-height: 350px; }
}
</style>
</head>
<body>

<header>
  <h1>AI JOURNALIST STUDIO</h1>
  <p>Local Journalism Engine</p>
</header>

<div class="container">

  <!-- Input -->
  <div class="card" id="input-card">
    <div class="card-title">New Article</div>
    <div class="form-group">
      <label for="topic">Topic</label>
      <input type="text" id="topic" placeholder="e.g. The future of quantum computing in medicine" autocomplete="off">
    </div>
    <div class="form-row">
      <div class="form-group">
        <label for="mode">Mode</label>
        <select id="mode">
          <option value="fast">Fast</option>
          <option value="deep">Deep</option>
        </select>
      </div>
      <div class="form-group">
        <label for="type">Type</label>
        <select id="type">
          <option value="analytical">Analytical</option>
          <option value="investigative">Investigative</option>
          <option value="feature">Feature</option>
          <option value="breaking">Breaking</option>
        </select>
      </div>
    </div>
    <button class="btn btn-primary" id="generate-btn" onclick="startGeneration()">
      Generate
    </button>
  </div>

  <!-- Progress -->
  <div class="card progress-section" id="progress-section">
    <div class="progress-section-inner">
      <div class="stage-text" id="stage-text">Initializing...</div>
      <div class="progress-bar-track">
        <div class="progress-bar-fill" id="progress-fill"></div>
      </div>
      <div class="progress-label">
        <span id="stage-label">Queued</span>
        <span id="percent-label">0%</span>
      </div>
      <div class="stage-error" id="stage-error" style="display:none;"></div>
    </div>
  </div>

  <!-- Results -->
  <div class="card results-section" id="results-section">
    <div class="card-title">Article</div>
    <div class="article-preview" id="article-preview"></div>
    <div class="download-bar" id="download-bar">
      <button class="btn btn-download" data-fmt="md" onclick="downloadArticle('md')" disabled>.md</button>
      <button class="btn btn-download" data-fmt="html" onclick="downloadArticle('html')" disabled>.html</button>
      <button class="btn btn-download" data-fmt="docx" onclick="downloadArticle('docx')" disabled>.docx</button>
      <button class="btn btn-download" data-fmt="pdf" onclick="downloadArticle('pdf')" disabled>.pdf</button>
    </div>
    <div class="card-title" style="margin-top:1.5rem;">Images</div>
    <div class="image-gallery" id="image-gallery"></div>
  </div>

</div>

<footer>
  100% Local · No API Keys · Unlimited Articles
</footer>

<script>
let currentSlug = null;
let progressInterval = null;

function startGeneration() {
  const topic = document.getElementById('topic').value.trim();
  if (!topic) {
    document.getElementById('topic').focus();
    return;
  }

  const mode = document.getElementById('mode').value;
  const type = document.getElementById('type').value;
  const btn = document.getElementById('generate-btn');

  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span> Generating...';

  document.getElementById('results-section').classList.remove('active');
  document.getElementById('progress-section').classList.add('active');
  document.getElementById('stage-error').style.display = 'none';

  fetch('/generate', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ topic: topic, mode: mode, type: type })
  })
  .then(r => r.json())
  .then(data => {
    if (data.error) {
      showError(data.error);
      return;
    }
    currentSlug = null;
    if (progressInterval) clearInterval(progressInterval);
    progressInterval = setInterval(pollProgress, 2000);
    pollProgress();
  })
  .catch(err => showError('Failed to start generation: ' + err.message));
}

function pollProgress() {
  fetch('/progress')
    .then(r => r.json())
    .then(state => {
      document.getElementById('progress-fill').style.width = state.percent + '%';
      document.getElementById('percent-label').textContent = state.percent + '%';
      document.getElementById('stage-label').textContent = state.stage;
      document.getElementById('stage-text').textContent = formatStage(state.stage);

      if (state.stage === 'done') {
        clearInterval(progressInterval);
        progressInterval = null;
        onComplete(state.slug);
      } else if (state.stage === 'error') {
        clearInterval(progressInterval);
        progressInterval = null;
        showError(state.error || 'Unknown error');
      }
    })
    .catch(err => {
      /* keep polling */;
    });
}

function formatStage(stage) {
  const map = {
    'idle': 'Idle',
    'queued': 'Queued...',
    'researching': 'Researching topic...',
    'writing': 'Writing article...',
    'auditing': 'Auditing for accuracy...',
    'images': 'Collecting images...',
    'publishing': 'Publishing article...',
    'done': 'Complete!',
    'error': 'Error'
  };
  return map[stage] || stage;
}

function onComplete(slug) {
  currentSlug = slug;

  document.getElementById('generate-btn').disabled = false;
  document.getElementById('generate-btn').textContent = 'Generate';

  document.getElementById('results-section').classList.add('active');

  fetch('/article/' + slug)
    .then(r => r.text())
    .then(html => {
      // Extract body content from the rendered article page
      const parser = new DOMParser();
      const doc = parser.parseFromString(html, 'text/html');
      const body = doc.body;
      document.getElementById('article-preview').innerHTML = body.innerHTML;
    })
    .catch(() => {
      document.getElementById('article-preview').innerHTML = '<p style="color:var(--error)">Failed to load article preview.</p>';
    });

  document.querySelectorAll('.btn-download').forEach(b => b.disabled = false);

  // Fetch images
  fetch('/images/' + slug + '/index.json')
    .then(r => r.json())
    .then(images => {
      const gallery = document.getElementById('image-gallery');
      gallery.innerHTML = '';
      if (!images.length) {
        gallery.innerHTML = '<p style="color:var(--text-secondary);font-size:0.85rem;">No images collected.</p>';
        return;
      }
      images.forEach(img => {
        const item = document.createElement('div');
        item.className = 'gallery-item';
        item.innerHTML = '<img src="' + img.filename + '" alt="' + img.caption + '" loading="lazy"><div class="gallery-caption">' + img.caption + '</div>';
        gallery.appendChild(item);
      });
    })
    .catch(() => {});
}

function downloadArticle(fmt) {
  if (!currentSlug) return;
  window.location.href = '/download/' + currentSlug + '/' + fmt;
}

function showError(msg) {
  document.getElementById('generate-btn').disabled = false;
  document.getElementById('generate-btn').textContent = 'Generate';

  document.getElementById('stage-error').style.display = 'block';
  document.getElementById('stage-error').textContent = msg;
  document.getElementById('stage-text').textContent = 'Error';
  document.getElementById('stage-label').textContent = 'error';
  document.getElementById('progress-fill').style.width = '0%';
  document.getElementById('percent-label').textContent = '0%';
}

// Allow Enter to submit
document.getElementById('topic').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') startGeneration();
});
</script>
</body>
</html>
